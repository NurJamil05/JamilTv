<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMIL TV - Premium Live</title>
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #02FFF0; 
            color: #3200AC; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            padding: 20px; 
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .main-content { flex: 1; }
        
        /* লোগো স্টাইল */
        .logo-container { margin: 15px auto 5px; }
        .logo { 
            width: 140px; height: auto; border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(50, 0, 172, 0.3); transition: transform 0.3s ease; 
        }
        .logo:hover { transform: scale(1.08); }

        h2 { font-size: 2rem; margin-bottom: 25px; color: #3200AC; font-weight: 800; }

        .player-container { 
            width: 100%; max-width: 750px; margin: 0 auto 30px; 
            border-radius: 15px; overflow: hidden; 
            box-shadow: 0 10px 30px rgba(50, 0, 172, 0.3); border: 3px solid #3200AC; 
        }
        
        /* Plyr Custom Theme */
        .plyr--video { --plyr-color-main: #3200AC; }
        .plyr__control--overlaid { background: rgba(50, 0, 172, 0.9); color: #02FFF0; }
        
        /* ক্যাটাগরি ট্যাব স্টাইল */
        .category-container {
            display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; max-width: 850px; margin-left: auto; margin-right: auto; flex-wrap: wrap;
        }
        .cat-btn {
            background: #3200AC; color: #02FFF0; border: none; padding: 10px 18px;
            font-weight: bold; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; font-size: 0.9rem;
        }
        .cat-btn.active {
            background: #fff; color: #3200AC; box-shadow: 0 0 15px rgba(255, 255, 255, 0.8); border: 2px solid #3200AC;
        }

        /* Responsive বাটন গ্রিড */
        .btn-container { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 850px; margin: 0 auto 40px; 
        }
        
        @media (min-width: 600px) {
            .btn-container { grid-template-columns: repeat(4, 1fr); }
        }

        .btn { 
            background: transparent; color: #3200AC; border: 2px solid #3200AC; 
            padding: 14px 15px; font-weight: bold; font-size: 0.95rem; 
            border-radius: 8px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; 
        }
        .btn:hover { background: #3200AC; color: #02FFF0; }
        .btn.active { background: #3200AC; color: #02FFF0; box-shadow: 0 0 20px rgba(50, 0, 172, 0.6); }

        /* ফুটার স্টাইল */
        footer {
            font-size: 0.9rem; font-weight: bold; color: #3200AC; padding: 20px 0 10px;
            letter-spacing: 1px; border-top: 1px solid rgba(50, 0, 172, 0.15); margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <!-- লোগো -->
        <div class="logo-container">
            <img src="https://static.vecteezy.com/system/resources/previews/029/933/242/non_2x/live-football-streaming-icon-button-for-broadcasting-or-online-football-stream-illustration-vector.jpg" alt="JAMIL TV Logo" class="logo">
        </div>
        
        <h2>JAMIL TV PREMIUM</h2>

        <div class="player-container">
            <video id="player" playsinline controls crossorigin muted autoplay></video>
        </div>

        <!-- ৬টি ক্যাটাগরি ফিল্টার বাটনসমূহ -->
        <div class="category-container">
            <button class="cat-btn active" onclick="filterCategory(1)">Category 1</button>
            <button class="cat-btn" onclick="filterCategory(2)">Category 2</button>
            <button class="cat-btn" onclick="filterCategory(3)">Category 3</button>
            <button class="cat-btn" onclick="filterCategory(4)">Category 4</button>
            <button class="cat-btn" onclick="filterCategory(5)">Category 5</button>
            <button class="cat-btn" onclick="filterCategory(6)">Category 6</button>
        </div>

        <!-- চ্যানল বাটন গ্রিড -->
        <div class="btn-container" id="buttons"></div>
    </div>

    <!-- ফুটার লাইন -->
    <footer>
        Jamil TV 2026 | ALL RIGHT RESERVED
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        // সিরিয়াল অনুযায়ী WC1 থেকে WC33 পর্যন্ত সব চ্যানেল ডেটা
        const channels = [
            // Category 1 (নতুন লিঙ্কসমূহ)
            { name: "WC1", url: "http://172.20.3.1:3255/TSportsHD/index.m3u8", category: 1 },
            { name: "WC2", url: "http://172.20.3.1:3255/tsp2rc/index.m3u8", category: 1 },
            { name: "WC3", url: "http://172.20.3.1:3255/tspnk3/index.m3u8", category: 1 },
            { name: "WC4", url: "http://172.20.3.1:3255/somyyt/index.m3u8", category: 1 },
            { name: "WC5", url: "http://172.20.3.1:3255/btv_sf/index.m3u8", category: 1 },
            { name: "WC6", url: "http://172.20.3.1:3255/ptv/index.m3u8", category: 1 },
            { name: "WC7", url: "http://172.20.3.1:3255/ZEE-CAFE-HD/index.m3u8", category: 1 },
            
            // Category 2
            { name: "WC8", url: "http://172.19.1.2/63463433/index.m3u8", category: 2 },
            { name: "WC9", url: "http://172.19.1.2/9865678/index.m3u8", category: 2 },
            { name: "WC10", url: "http://172.19.1.2/9346574/index.m3u8", category: 2 },
            { name: "WC11", url: "http://172.19.1.2/9090801/index.m3u8", category: 2 },
            { name: "WC12", url: "http://172.19.0.18:5000/stream/79/playlist.m3u8", category: 2 },
            { name: "WC13", url: "http://172.19.0.18:5000/stream/9182736450293/playlist.m3u8", category: 2 },
            { name: "WC14", url: "http://172.19.0.18:5000/stream/3748291029384/playlist.m3u8", category: 2 },
            { name: "WC15", url: "http://172.19.0.18:5000/stream/1/playlist.m3u8", category: 2 },
            { name: "WC16", url: "http://172.19.0.18:5000/stream/7364510293855/playlist.m3u8", category: 2 },
            { name: "WC17", url: "http://172.19.0.18:5000/stream/37/playlist.m3u8", category: 2 },
            { name: "WC18", url: "http://172.19.0.18:5000/stream/4829103847562/playlist.m3u8", category: 2 },
            { name: "WC19", url: "http://172.19.0.18:5000/stream/5019283746510/playlist.m3u8", category: 2 },
            
            // Category 3
            { name: "WC20", url: "http://103.158.133.62:8080/live/index.m3u8", category: 3 },
            { name: "WC21", url: "http://103.158.133.62:8080/tsports/index.m3u8", category: 3 },
            { name: "WC22", url: "http://103.158.133.62:8080/ptv/index.m3u8", category: 3 },
            { name: "WC23", url: "http://103.158.133.62:8080/btv/index.m3u8", category: 3 },
            { name: "WC24", url: "http://103.158.133.62:8080/somoytv/index.m3u8", category: 3 },

            // Category 4
            { name: "WC25", url: "http://172.20.21.22/live/skyfeed1004/index.m3u8", category: 4 },
            { name: "WC26", url: "http://172.20.21.22/live/skyfeed1005/index.m3u8", category: 4 },

            // Category 5
            { name: "WC27", url: "http://172.16.29.138:8090/hls/tsportshd.m3u8", category: 5 },
            { name: "WC28", url: "http://172.16.29.138:8090/hls/ptvsportshd.m3u8", category: 5 },
            { name: "WC29", url: "http://172.16.29.138:8090/hls/somoytv.m3u8", category: 5 },

            // Category 6 (Category 1 থেকে ট্রান্সফার হওয়া ওল্ড চ্যানেল)
            { name: "WC30", url: "http://10.200.200.2:8088/217/video.m3u8?token=apnnactg", category: 6 },
            { name: "WC31", url: "http://10.200.200.2:8088/205/video.m3u8?token=apnnactg", category: 6 },
            { name: "WC32", url: "http://10.200.200.2:8088/102/video.m3u8?token=apnnactg", category: 6 },
            { name: "WC33", url: "http://10.200.200.2:8088/125/video.m3u8?token=apnnactg", category: 6 }
        ];

        const video = document.getElementById('player');
        let hls;
        let currentActiveUrl = ""; 

        const player = new Plyr(video, {
            controls: ['play-large', 'play', 'rewind', 'fast-forward', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
            autoplay: true, muted: true
        });

        const btnContainer = document.getElementById('buttons');

        function filterCategory(catId) {
            const catButtons = document.querySelectorAll('.cat-btn');
            catButtons.forEach((btn, index) => {
                if (index === (catId - 1)) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            btnContainer.innerHTML = '';
            const filtered = channels.filter(ch => ch.category === catId);

            filtered.forEach((ch) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = ch.name;
                
                if (ch.url === currentActiveUrl) {
                    btn.classList.add('active');
                }

                btn.onclick = () => { 
                    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active')); 
                    btn.classList.add('active'); 
                    currentActiveUrl = ch.url;
                    playStream(ch.url); 
                };
                btnContainer.appendChild(btn);
            });
        }

        function playStream(url) {
            if (Hls.isSupported()) {
                if (hls) { hls.destroy(); }
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => player.play().catch(e => console.log(e)));
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play().catch(e => console.log(e));
            }
        }

        // শুরুতে Category 1 এর প্রথম চ্যানেল (WC1) অটো-প্লে হবে
        currentActiveUrl = channels[0].url;
        playStream(currentActiveUrl);
        filterCategory(1);
    </script>
</body>
</html>
