<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMIL TV - Ultimate Premium</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: linear-gradient(135deg, #0b0813 0%, #1a0f2e 50%, #0b0813 100%); 
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; padding: 20px; text-align: center; min-height: 100vh;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
        }
        h2 { font-size: 2.2rem; margin-bottom: 20px; background: linear-gradient(45deg, #00ff88, #00f0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 0 20px rgba(0,255,136,0.3); font-weight: 800; }
        .menu-container { margin-bottom: 25px; }
        .category-select { background: rgba(26, 15, 46, 0.8); color: #fff; border: 2px solid #00ff88; padding: 10px 25px; font-size: 1rem; border-radius: 25px; cursor: pointer; outline: none; font-weight: bold; box-shadow: 0 0 15px rgba(0, 255, 136, 0.2); }
        .category-select option { background: #1a0f2e; color: #fff; }
        .player-container { width: 100%; max-width: 750px; margin: 0 auto 25px; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 255, 136, 0.2); border: 2px solid rgba(0, 255, 136, 0.2); }
        .plyr--video { --plyr-color-main: #00ff88; }
        .plyr__control--overlaid { background: rgba(0, 255, 136, 0.8); color: #000; }
        .btn-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 800px; margin: 0 auto; }
        .btn { background: rgba(255, 255, 255, 0.03); color: #fff; border: 1px solid rgba(0, 240, 255, 0.3); padding: 12px 20px; font-weight: bold; font-size: 0.95rem; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(5px); }
        .btn:hover { background: #00f0ff; color: #000; box-shadow: 0 0 15px #00f0ff; transform: translateY(-2px); }
        .btn.active { background: linear-gradient(45deg, #00ff88, #00f0ff); color: #000; box-shadow: 0 0 20px rgba(0, 255, 136, 0.6); border: none; }
    </style>
</head>
<body oncontextmenu="return false;"> <h2>📺 JAMIL TV PREMIUM</h2>

    <div class="menu-container">
        <select id="categoryMenu" class="category-select" onchange="filterCategories()">
            <option value="all">Category: All</option>
            <option value="fifa">Category: FIFA Dedicated</option>
            <option value="cloud">Category: Cloud & Redforce</option>
        </select>
    </div>

    <div class="player-container">
        <video id="player" playsinline controls crossorigin></video>
    </div>

    <div class="btn-container" id="buttons"></div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        // তোর লিংকগুলোকে Base64 ফরম্যাটে এনকোড করে হিজিবিজি করে রাখা হয়েছে
        const encryptedData = "W3sibmFtZSI6IldDMSIsInVybCI6Imh0dHA6Ly8xNzIuMTkuMS4yLzYzNDYzNDMzL2luZGV4Lm0zdTgiLCJjYXRlZ29yeSI6ImZpZmEifSx7Im5hbWUiOiJXQzIiLCJ1cmwiOiJodHRwOi8vMTcyLjE5LjEuMi85ODY1Njc4L2luZGV4Lm0zdTgiLCJjYXRlZ29yeSI6ImZpZmEifSx7Im5hbWUiOiJXQzMiLCJ1cmwiOiJodHRwOi8vMTcyLjE5LjEuMi85MzQ2NTc0L2luZGV4Lm0zdTgiLCJjYXRlZ29yeSI6ImZpZmEifSx7Im5hbWUiOiJXQzQiLCJ1cmwiOiJodHRwOi8vMTcyLjE5LjEuMi85MDkwODAxL2luZGV4Lm0zdTgiLCJjYXRlZ29yeSI6ImZpZmEifSx7Im5hbWUiOiJXQzUiLCJ1cmwiOiJodHRwOi8vMTcyLjE5LjAuMTg6NTAwMC9zdHJlYW0vMS9wbGF5bGlzdC5tM3U4IiwiY2F0ZWdvcnkiOiJjbG91ZCJ9LHsia2FtZSI6IldDNiIsInVybCI6Imh0dHA6Ly8xNzIuMTkuMC4xODo1MDAwL3N0cmVhbS8zNzQ4MjkxMDI5Mzg0L3BsYXlsaXN0Lm0zdTgiLCJjYXRlZ29yeSI6ImNsb3VkIn0seyJuYW1lIjOiJXQzciLCJ1cmwiOiJodHRwOi8vMTcyLjE5LjAuMTg6NTAwMC9zdHJlYW0vOTE4MjczNjQ1MDI5My9wbGF5bGlzdC5tM3U4IiwiY2F0ZWdvcnkiOiJjbG91ZCJ9LHsia2FtZSI6IldDOCIsInVybCI6Imh0dHA6Ly8xNzIuMTkuMC4xODo1MDAwL3N0cmVhbS83OS9wbGF5bGlzdC5tM3U4IiwiY2F0ZWdvcnkiOiJjbG91ZCJdfQ==";
        
        // রান টাইমে কোডটি ডিকোড হবে কিন্তু view-source এ ইউজার শুধু উপরের হিজিবিজি লেখাটুকু দেখবে
        const channels = JSON.parse(atob(encryptedData));

        const video = document.getElementById('player');
        let hls;
        
        const player = new Plyr(video, {
            controls: ['play-large', 'play', 'rewind', 'fast-forward', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
            settings: ['quality', 'speed'],
            speed: { selected: 1, options: [0.5, 1, 1.5, 2] },
            seekTime: 10
        });

        const btnContainer = document.getElementById('buttons');

        function renderButtons() {
            btnContainer.innerHTML = ''; 
            channels.forEach((ch, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = ch.name;
                btn.setAttribute('data-category', ch.category);
                btn.onclick = () => { 
                    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    playStream(ch.url); 
                };
                btnContainer.appendChild(btn);
                if(idx === 0) { btn.classList.add('active'); playStream(ch.url); }
            });
        }

        function filterCategories() {
            const selectedCategory = document.getElementById('categoryMenu').value;
            document.querySelectorAll('.btn').forEach(btn => {
                const btnCategory = btn.getAttribute('data-category');
                btn.style.display = (selectedCategory === 'all' || btnCategory === selectedCategory) ? 'inline-block' : 'none';
            });
        }

        function playStream(url) {
            if (Hls.isSupported()) {
                if (hls) { hls.destroy(); }
                hls = new Hls(); hls.loadSource(url); hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    const availableQualities = hls.levels.map(l => l.height);
                    player.config.quality = { default: availableQualities[0], options: availableQualities, forced: true, onChange: (e) => updateQuality(e) };
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
        }

        function updateQuality(newQuality) {
            if (hls) { hls.levels.forEach((level, levelIndex) => { if (level.height === newQuality) { hls.currentLevel = levelIndex; } }); }
        }

        // F12 / Inspect Element ব্লক করার স্ক্রিপ্ট
        document.onkeydown = function(e) {
            if(event.keyCode == 123) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
        }

        renderButtons();
    </script>
</body>
</html>
