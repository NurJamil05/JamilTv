<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMIL TV - Ultimate Premium</title>
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #06040a; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 15px; 
            min-height: 100vh;
            text-align: center;
        }
        h2 { 
            font-size: 1.8rem; 
            margin: 10px 0 15px; 
            background: linear-gradient(45deg, #00ff88, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        /* Category Selector Styling */
        .menu-wrapper {
            margin-bottom: 20px;
        }
        .select-box {
            background: #11091f;
            color: #00f0ff;
            border: 2px solid #00ff88;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        /* Player Wrapper - MX/NS Player UI */
        .player-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto 25px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #11091f;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9), 0 0 20px rgba(0, 255, 136, 0.1);
            position: relative;
        }
        .video-js { width: 100%; aspect-ratio: 16/9; }
        
        /* Premium MX Player UI Customization */
        .video-js .vjs-big-play-button { 
            background-color: rgba(0, 255, 136, 0.8) !important; 
            border: none !important;
            color: #000 !important;
            border-radius: 50% !important;
            width: 65px !important;
            height: 65px !important;
            line-height: 65px !important;
            margin-top: -32.5px !important;
            margin-left: -32.5px !important;
        }
        .video-js .vjs-control-bar { background-color: rgba(6, 4, 10, 0.85) !important; height: 50px !important; }
        .video-js .vjs-play-progress { background-color: #00ff88 !important; }
        .video-js .vjs-slider { background-color: rgba(255, 255, 255, 0.2) !important; }
        .video-js .vjs-load-progress { background: rgba(255, 255, 255, 0.1) !important; }

        /* Channels Grid */
        .btn-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; }
        .btn { 
            background: #11091f; color: #fff; border: 1px solid rgba(0, 240, 255, 0.2); padding: 12px 22px; 
            border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; font-size: 0.95rem;
        }
        .btn:hover { background: rgba(0, 255, 136, 0.2); border-color: #00ff88; }
        .btn.active { background: linear-gradient(45deg, #00ff88, #00f0ff); color: #000; border: none; box-shadow: 0 0 15px #00ff88; }
    </style>
</head>
<body>

    <h2>JAMIL TV ULTIMATE</h2>

    <div class="menu-wrapper">
        <select id="categoryMenu" class="select-box" onchange="filterCategories()">
            <option value="all">Category: All</option>
            <option value="fifa">Category: FIFA Dedicated</option>
            <option value="cloud">Category: Cloud & Redforce</option>
        </select>
    </div>

    <div class="player-container">
        <video id="tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" playsinline></video>
    </div>

    <div class="btn-container" id="buttons"></div>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script>
        const channels = [
            { name: "WC1", url: "http://172.19.1.2/63463433/index.m3u8", category: "fifa" },
            { name: "WC2", url: "http://172.19.1.2/9865678/index.m3u8", category: "fifa" },
            { name: "WC3", url: "http://172.19.1.2/9346574/index.m3u8", category: "fifa" },
            { name: "WC4", url: "http://172.19.1.2/9090801/index.m3u8", category: "fifa" },
            { name: "WC5", url: "http://172.19.0.18:5000/stream/1/playlist.m3u8", category: "cloud" },
            { name: "WC6", url: "http://172.19.0.18:5000/stream/3748291029384/playlist.m3u8", category: "cloud" },
            { name: "WC7", url: "http://172.19.0.18:5000/stream/9182736450293/playlist.m3u8", category: "cloud" },
            { name: "WC8", url: "http://172.19.0.18:5000/stream/79/playlist.m3u8", category: "cloud" }
        ];

        // MX Player style configurations with Speed Control and 10s Skip Buttons Built-in
        const player = videojs('tv-player', {
            playbackRates: [0.5, 1, 1.5, 2],
            controlBar: {
                skipButtons: {
                    forward: 10,
                    backward: 10
                }
            }
        });

        // Double Tap Gesture for Mobile (Like MX / YouTube)
        player.ready(function() {
            const el = player.el();
            let lastTap = 0;

            el.addEventListener('touchend', function(e) {
                const currentTime = new Date().getTime();
                const tapLength = currentTime - lastTap;
                if (tapLength < 300 && tapLength > 0) {
                    // Get tap position to see if it's left or right side of screen
                    const rect = el.getBoundingClientRect();
                    const x = e.changedTouches[0].clientX - rect.left;
                    if (x < rect.width / 2) {
                        player.currentTime(player.currentTime() - 10); // Left Side Double Tap = Rewind 10s
                    } else {
                        player.currentTime(player.currentTime() + 10); // Right Side Double Tap = Forward 10s
                    }
                    e.preventDefault();
                }
                lastTap = currentTime;
            });
        });

        const btnContainer = document.getElementById('buttons');

        function loadChannel(url) {
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play().catch(function(error) {
                console.log("Stream load error: ", error);
            });
        }

        function renderButtons() {
            btnContainer.innerHTML = '';
            channels.forEach((ch, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = ch.name;
                btn.setAttribute('data-category', ch.category);
                btn.onclick = () => {
                    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadChannel(ch.url);
                };
                btnContainer.appendChild(btn);
                if(idx === 0) { btn.classList.add('active'); loadChannel(ch.url); }
            });
        }

        function filterCategories() {
            const val = document.getElementById('categoryMenu').value;
            document.querySelectorAll('.btn').forEach(btn => {
                const cat = btn.getAttribute('data-category');
                btn.style.display = (val === 'all' || cat === val) ? 'inline-block' : 'none';
            });
        }

        renderButtons();
    </script>
</body>
</html>
