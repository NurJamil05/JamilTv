<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMIL TV</title>
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; padding: 15px; text-align: center; }
        .video-js { width: 100% !important; max-width: 600px; height: auto; aspect-ratio: 16/9; margin: 0 auto 20px; border-radius: 8px; }
        .btn-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .btn { background: #00ff88; color: #000; border: none; padding: 12px 20px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: #00cc6e; }
    </style>
</head>
<body>

    <h2>📺 JAMIL TV</h2><br>

    <video id="tv-player" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>

    <div class="btn-container" id="buttons"></div>

    <script src="https://vjs.zencdn.net/8.3.0/video.js"></script>
    <script>
        // তোর দেওয়া সব লিংকের পারফেক্ট লিস্ট
        const channels = [
            { name: "WC1", url: "http://172.19.1.2/63463433/index.m3u8", type: "application/x-mpegURL" },
            { name: "WC2", url: "http://172.19.1.2/9865678/index.m3u8", type: "application/x-mpegURL" },
            { name: "WC3", url: "http://172.19.1.2/9346574/index.m3u8", type: "application/x-mpegURL" },
            { name: "WC4", url: "http://172.19.1.2/9090801/index.m3u8", type: "application/x-mpegURL" },
            { name: "WC5", url: "http://172.19.0.18:5000/stream/1/playlist.m3u8", type: "application/x-mpegURL" },
            { name: "WC6", url: "http://172.19.0.18:5000/stream/3748291029384/playlist.m3u8", type: "application/x-mpegURL" },
            { name: "WC7", url: "http://172.19.0.18:5000/stream/9182736450293/playlist.m3u8", type: "application/x-mpegURL" },
            { name: "WC8", url: "http://172.19.0.18:5000/stream/79/playlist.m3u8", type: "application/x-mpegURL" }
        ];

        const player = videojs('tv-player');
        const btnContainer = document.getElementById('buttons');

        channels.forEach((ch, idx) => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = ch.name;
            btn.onclick = () => { playStream(ch.url, ch.type); };
            btnContainer.appendChild(btn);
            if(idx === 0) { playStream(ch.url, ch.type); }
        });

        function playStream(url, type) {
            player.src({ src: url, type: type });
            player.play().catch(function(error) {
                console.log("Error playing stream: ", error);
            });
        }
    </script>
</body>
</html>
