<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMIL TV - Premium Live</title>
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #02FFF0; 
            color: #3200AC; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            padding: 20px; 
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .main-content {
            flex: 1;
        }
        
        /* লোগো স্টাইল */
        .logo-container {
            margin: 15px auto 5px;
        }
        .logo { 
            width: 140px; 
            height: auto;
            border-radius: 12px; 
            box-shadow: 0 5px 15px rgba(50, 0, 172, 0.3);
            transition: transform 0.3s ease; 
        }
        .logo:hover { 
            transform: scale(1.08); 
        }

        h2 { 
            font-size: 2rem; 
            margin-bottom: 25px; 
            color: #3200AC; 
            font-weight: 800; 
        }

        .player-container { 
            width: 100%; 
            max-width: 750px; 
            margin: 0 auto 30px; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(50, 0, 172, 0.3); 
            border: 3px solid #3200AC; 
        }
        
        /* Plyr Custom Theme */
        .plyr--video { --plyr-color-main: #3200AC; }
        .plyr__control--overlaid { background: rgba(50, 0, 172, 0.9); color: #02FFF0; }
        
        /* Responsive বাটন গ্রিড */
        .btn-container { 
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* মোবাইলে ১ লাইনে ২টা বাটন */
            gap: 12px; 
            max-width: 850px; 
            margin: 0 auto 40px; 
        }
        
        @media (min-width: 600px) {
            .btn-container {
                grid-template-columns: repeat(4, 1fr); /* পিসি বা ট্যাবে ১ লাইনে ৪টা বাটন */
            }
        }

        .btn { 
            background: transparent; 
            color: #3200AC; 
            border: 2px solid #3200AC; 
            padding: 14px 15px; 
            font-weight: bold; 
            font-size: 0.95rem; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            text-transform: uppercase; 
        }
        .btn:hover { 
            background: #3200AC; 
            color: #02FFF0; 
        }
        .btn.active { 
            background: #3200AC; 
            color: #02FFF0; 
            box-shadow: 0 0 20px rgba(50, 0, 172, 0.6); 
        }

        /* ফুটার স্টাইল */
        footer {
            font-size: 0.9rem;
            font-weight: bold;
            color: #3200AC;
            padding: 20px 0 10px;
            letter-spacing: 1px;
            border-top: 1px solid rgba(50, 0, 172, 0.15);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <!-- লোগো -->
        <div class="logo-container">
            <img src="https://static.vecteezy.com/system/resources/previews/029/933/242/non_2x/live-football-streaming-icon-button-for-broadcasting-or-online-football-stream-illustration-vector.jpg" alt="JAMIL TV Logo" class="logo">
        </div>
        
        <h2>JAMIL TV PREMIUM</h2>

        <div class="player-container">
            <video id="player" playsinline controls crossorigin muted autoplay></video>
        </div>

        <!-- ১২টি চ্যানেলের বাটন গ্রিড -->
        <div class="btn-container" id="buttons"></div>
    </div>

    <!-- ফুটার লাইন -->
    <footer>
        Jamil TV 2026 | ALL RIGHT RESERVED
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        // এখানে তোর নতুন ৪টি লিঙ্ক (WC5-WC8) সহ সব চ্যানেল সাজানো আছে
        const channels = [
            { name: "WC1", url: "http://172.19.1.2/63463433/index.m3u8" },
            { name: "WC2", url: "http://172.19.1.2/9865678/index.m3u8" },
            { name: "WC3", url: "http://172.19.1.2/9346574/index.m3u8" },
            { name: "WC4", url: "http://172.19.1.2/9090801/index.m3u8" },
            { name: "WC5", url: "http://172.19.0.18:5000/stream/79/playlist.m3u8" },
            { name: "WC6", url: "http://172.19.0.18:5000/stream/9182736450293/playlist.m3u8" },
            { name: "WC7", url: "http://172.19.0.18:5000/stream/3748291029384/playlist.m3u8" },
            { name: "WC8", url: "http://172.19.0.18:5000/stream/1/playlist.m3u8" },
            { name: "BTV", url: "http://10.200.200.2:8088/217/video.m3u8?token=apnnactg" },
            { name: "SOMOY TV", url: "http://10.200.200.2:8088/205/video.m3u8?token=apnnactg" },
            { name: "T SPORTS", url: "http://10.200.200.2:8088/102/video.m3u8?token=apnnactg" },
            { name: "PTV SPORTS", url: "http://10.200.200.2:8088/125/video.m3u8?token=apnnactg" }
        ];

        const video = document.getElementById('player');
        let hls;
        const player = new Plyr(video, {
            controls: ['play-large', 'play', 'rewind', 'fast-forward', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'fullscreen'],
            autoplay: true, 
            muted: true
        });

        const btnContainer = document.getElementById('buttons');
        function renderButtons() {
            btnContainer.innerHTML = ''; 
            channels.forEach((ch, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = ch.name;
                btn.onclick = () => { 
                    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active')); 
                    btn.classList.add('active'); 
                    playStream(ch.url); 
                };
                btnContainer.appendChild(btn);
                if(idx === 0) { btn.classList.add('active'); playStream(ch.url); }
            });
        }

        function playStream(url) {
            if (Hls.isSupported()) {
                if (hls) { hls.destroy(); }
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => player.play().catch(e => console.log(e)));
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play().catch(e => console.log(e));
            }
        }
        renderButtons();
    </script>
</body>
</html>
