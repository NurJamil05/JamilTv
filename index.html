<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMIL TV - ULTIMATE OTT</title>
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0a0a0a; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 15px; 
            min-height: 100vh;
            text-align: center;
        }
        h2 { 
            font-size: 2rem; 
            margin-bottom: 20px; 
            background: linear-gradient(45deg, #ff007f, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        /* Category Menu */
        .category-container { margin-bottom: 20px; }
        .select-box {
            background: #1a1a2e;
            color: #00f0ff;
            border: 2px solid #ff007f;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }

        /* Player Styling */
        .player-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto 25px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .video-js { width: 100%; aspect-ratio: 16/9; }
        
        /* Custom Control Bar Theme */
        .vjs-matrix.video-js { color: #00ff88; }
        .vjs-city .vjs-big-play-button { border: none; background-color: rgba(255, 0, 127, 0.8); }

        .btn-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; }
        .btn { 
            background: #1a1a2e; color: #fff; border: 1px solid #444; padding: 12px 20px; 
            border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn:hover, .btn.active { background: #ff007f; border-color: #ff007f; box-shadow: 0 0 15px #ff007f; }
    </style>
</head>
<body>

    <h2>JAMIL TV PREMIUM</h2>

    <div class="category-container">
        <select id="categoryMenu" class="select-box" onchange="filterCategories()">
            <option value="all">Category: All</option>
            <option value="fifa">Category: FIFA Dedicated</option>
            <option value="cloud">Category: Cloud & Redforce</option>
        </select>
    </div>

    <div class="player-container">
        <video id="tv-player" class="video-js vjs-theme-city vjs-big-play-centered" controls preload="auto"></video>
    </div>

    <div class="btn-container" id="buttons"></div>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script>
        const channels = [
            { name: "WC1", url: "http://172.19.1.2/63463433/index.m3u8", category: "fifa" },
            { name: "WC2", url: "http://172.19.1.2/9865678/index.m3u8", category: "fifa" },
            { name: "WC3", url: "http://172.19.1.2/9346574/index.m3u8", category: "fifa" },
            { name: "WC4", url: "http://172.19.1.2/9090801/index.m3u8", category: "fifa" },
            { name: "WC5", url: "http://172.19.0.18:5000/stream/1/playlist.m3u8", category: "cloud" },
            { name: "WC6", url: "http://172.19.0.18:5000/stream/3748291029384/playlist.m3u8", category: "cloud" },
            { name: "WC7", url: "http://172.19.0.18:5000/stream/9182736450293/playlist.m3u8", category: "cloud" },
            { name: "WC8", url: "http://172.19.0.18:5000/stream/79/playlist.m3u8", category: "cloud" }
        ];

        // Initialize VideoJS
        const player = videojs('tv-player', {
            playbackRates: [0.5, 1, 1.5, 2],
            controlBar: {
                skipButtons: {
                    forward: 10,
                    backward: 10
                }
            }
        });

        // Add 10s Rewind/Forward buttons manually for mobile
        player.ready(function() {
            const controlBar = player.controlBar;
            const SkipBack = videojs.getComponent('Button');
            const skipBackBtn = videojs.extend(SkipBack, {
                constructor: function() { SkipBack.apply(this, arguments); },
                handleClick: function() { player.currentTime(player.currentTime() - 10); },
                buildCSSClass: function() { return 'vjs-icon-replay-10 vjs-control vjs-button'; }
            });
            const SkipForward = videojs.getComponent('Button');
            const skipForwardBtn = videojs.extend(SkipForward, {
                constructor: function() { SkipForward.apply(this, arguments); },
                handleClick: function() { player.currentTime(player.currentTime() + 10); },
                buildCSSClass: function() { return 'vjs-icon-forward-10 vjs-control vjs-button'; }
            });
            
            videojs.registerComponent('SkipBackBtn', skipBackBtn);
            videojs.registerComponent('SkipForwardBtn', skipForwardBtn);
            controlBar.addChild('SkipBackBtn', {}, 1);
            controlBar.addChild('SkipForwardBtn', {}, 2);
        });

        const btnContainer = document.getElementById('buttons');

        function loadChannel(url) {
            player.src({ src: url, type: 'application/x-mpegURL' });
            player.play();
        }

        function renderButtons() {
            btnContainer.innerHTML = '';
            channels.forEach((ch, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = ch.name;
                btn.setAttribute('data-category', ch.category);
                btn.onclick = () => {
                    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadChannel(ch.url);
                };
                btnContainer.appendChild(btn);
                if(idx === 0) { btn.classList.add('active'); loadChannel(ch.url); }
            });
        }

        function filterCategories() {
            const val = document.getElementById('categoryMenu').value;
            document.querySelectorAll('.btn').forEach(btn => {
                const cat = btn.getAttribute('data-category');
                btn.style.display = (val === 'all' || cat === val) ? 'inline-block' : 'none';
            });
        }

        renderButtons();
    </script>
</body>
</html>
