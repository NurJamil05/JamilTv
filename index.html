<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMIL TV - Premium Live</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: linear-gradient(135deg, #0b0813 0%, #1a0f2e 50%, #0b0813 100%); 
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            padding: 20px; 
            text-align: center;
            min-height: 100vh;
        }
        h2 {
            font-size: 2.2rem;
            margin-top: 10px;
            margin-bottom: 25px;
            background: linear-gradient(45deg, #00ff88, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0,255,136,0.3);
            font-weight: 800;
        }

        .player-container {
            width: 100%;
            max-width: 750px;
            margin: 0 auto 30px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(0, 255, 136, 0.2);
            border: 2px solid rgba(0, 255, 136, 0.2);
        }
        
        /* Plyr Neon Theme Customization */
        .plyr--video { --plyr-color-main: #00ff88; }
        .plyr__control--overlaid { background: rgba(0, 255, 136, 0.8); color: #000; }
        
        /* Channels Grid */
        .btn-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 12px; 
            justify-content: center; 
            max-width: 850px;
            margin: 0 auto;
        }
        .btn { 
            background: rgba(255, 255, 255, 0.03);
            color: #fff; 
            border: 1px solid rgba(0, 240, 255, 0.3); 
            padding: 14px 24px; 
            font-weight: bold; 
            font-size: 1rem;
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .btn:hover { 
            background: #00f0ff; 
            color: #000;
            box-shadow: 0 0 15px #00f0ff;
            transform: translateY(-2px);
        }
        .btn.active {
            background: linear-gradient(45deg, #00ff88, #00f0ff);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
            border: none;
        }
    </style>
</head>
<body>

    <h2>📺 JAMIL TV PREMIUM</h2>

    <div class="player-container">
        <video id="player" playsinline controls crossorigin></video>
    </div>

    <div class="btn-container" id="buttons"></div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        // তোর নতুন এবং রিফাইন করা চ্যানেলের লিস্ট
        const channels = [
            { name: "WC1", url: "http://172.19.1.2/63463433/index.m3u8" },
            { name: "WC2", url: "http://172.19.1.2/9865678/index.m3u8" },
            { name: "WC3", url: "http://172.19.1.2/9346574/index.m3u8" },
            { name: "WC4", url: "http://172.19.1.2/9090801/index.m3u8" },
            { name: "BTV", url: "http://10.200.200.2:8088/217/video.m3u8?token=apnnactg" },
            { name: "SOMOY TV", url: "http://10.200.200.2:8088/205/video.m3u8?token=apnnactg" },
            { name: "T SPORTS", url: "http://10.200.200.2:8088/102/video.m3u8?token=apnnactg" },
            { name: "PTV SPORTS", url: "http://10.200.200.2:8088/125/video.m3u8?token=apnnactg" }
        ];

        const video = document.getElementById('player');
        let hls;
        
        // Plyr Configuration with Pip
        const player = new Plyr(video, {
            controls: [
                'play-large', 'play', 'rewind', 'fast-forward', 'progress', 
                'current-time', 'mute', 'volume', 'settings', 'pip', 'fullscreen'
            ],
            settings: ['quality', 'speed'],
            speed: { selected: 1, options: [0.5, 1, 1.5, 2] },
            seekTime: 10
        });

        const btnContainer = document.getElementById('buttons');

        // সোজা সব চ্যানেলের বাটন জেনারেট হবে (কোনো ক্যাটাগরি ফিল্টার ছাড়া)
        function renderButtons() {
            btnContainer.innerHTML = ''; 
            channels.forEach((ch, idx) => {
                const btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = ch.name;
                btn.onclick = () => { 
                    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    playStream(ch.url); 
                };
                btnContainer.appendChild(btn);
                
                // প্রথম চ্যানেল (WC1) অটো-প্লে করার জন্য
                if(idx === 0) { 
                    btn.classList.add('active');
                    playStream(ch.url); 
                }
            });
        }

        function playStream(url) {
            if (Hls.isSupported()) {
                if (hls) { hls.destroy(); }
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    const availableQualities = hls.levels.map(l => l.height);
                    player.config.quality = {
                        default: availableQualities[0],
                        options: availableQualities,
                        forced: true,
                        onChange: (e) => updateQuality(e)
                    };
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
            }
        }

        function updateQuality(newQuality) {
            if (hls) {
                hls.levels.forEach((level, levelIndex) => {
                    if (level.height === newQuality) { hls.currentLevel = levelIndex; }
                });
            }
        }

        renderButtons();
    </script>
</body>
</html>
